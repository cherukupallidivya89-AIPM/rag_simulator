<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 95%;
        max-width: 1200px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .pipeline {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .step {
        flex: 1;
        margin: 5px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(255,255,255,0.08);
        text-align: center;
        transition: 0.3s;
        cursor: pointer;
    }

    .step.active {
        background: #00d4ff;
        color: black;
        transform: scale(1.05);
    }

    textarea, input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        resize: none;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        border-radius: 10px;
        border: none;
        background: #00d4ff;
        cursor: pointer;
        font-weight: bold;
    }

    .output {
        margin-top: 20px;
        background: rgba(255,255,255,0.08);
        padding: 15px;
        border-radius: 12px;
        min-height: 100px;
    }

    .chunk {
        padding: 5px;
        margin: 5px 0;
        background: rgba(255,255,255,0.1);
        border-radius: 8px;
    }

    .highlight {
        background: #00ffcc;
        color: black;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🔍 RAG Pipeline Simulator</h1>

    <div class="pipeline">
        <div class="step" id="step1">1️⃣ Chunking</div>
        <div class="step" id="step2">2️⃣ Embedding</div>
        <div class="step" id="step3">3️⃣ Vector Search</div>
        <div class="step" id="step4">4️⃣ Context Injection</div>
        <div class="step" id="step5">5️⃣ LLM Response</div>
    </div>

    <label>📄 Knowledge Base</label>
    <textarea id="docs" rows="4">
RAG stands for Retrieval Augmented Generation. 
It improves LLM responses using external documents.
Vector databases store embeddings.
Embeddings represent semantic meaning.
    </textarea>

    <label>❓ User Question</label>
    <input id="query" placeholder="Ask something..." />

    <button onclick="runRAG()">Run RAG Simulation</button>

    <div class="output" id="output"></div>
</div>

<script>

const steps = document.querySelectorAll(".step");

function activateStep(index) {
    steps.forEach(s => s.classList.remove("active"));
    steps[index].classList.add("active");
}

function fakeEmbedding(text) {
    return text.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
}

function runRAG() {
    const docs = document.getElementById("docs").value;
    const query = document.getElementById("query").value;
    const output = document.getElementById("output");

    output.innerHTML = "";

    // Step 1: Chunking
    activateStep(0);
    const chunks = docs.split(".");
    setTimeout(() => {
        output.innerHTML = "<h3>Chunks:</h3>";
        chunks.forEach(c => {
            if(c.trim()){
                output.innerHTML += `<div class="chunk">${c.trim()}</div>`;
            }
        });
    }, 500);

    // Step 2: Embedding
    setTimeout(() => {
        activateStep(1);
        output.innerHTML += "<h3>Embeddings Created ✔</h3>";
    }, 1500);

    // Step 3: Vector Search
    setTimeout(() => {
        activateStep(2);
        const queryEmbedding = fakeEmbedding(query);
        let bestMatch = "";
        let bestScore = Infinity;

        chunks.forEach(chunk => {
            const score = Math.abs(fakeEmbedding(chunk) - queryEmbedding);
            if(score < bestScore) {
                bestScore = score;
                bestMatch = chunk;
            }
        });

        output.innerHTML += `<h3>Top Retrieved Chunk:</h3>
            <div class="chunk highlight">${bestMatch}</div>`;
        
        window.bestMatch = bestMatch;
    }, 2500);

    // Step 4: Context Injection
    setTimeout(() => {
        activateStep(3);
        output.innerHTML += `<h3>Prompt Sent to LLM:</h3>
        <div class="chunk">Context: ${window.bestMatch}<br>
        Question: ${query}</div>`;
    }, 3500);

    // Step 5: LLM Response
    setTimeout(() => {
        activateStep(4);
        output.innerHTML += `<h3>LLM Response:</h3>
        <div class="chunk highlight">
        Based on the retrieved document: "${window.bestMatch}", 
        here is the answer to your question: "${query}".
        </div>`;
    }, 4500);
}

</script>

</body>
</html>
